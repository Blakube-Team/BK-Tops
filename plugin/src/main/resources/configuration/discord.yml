############################################
# BK-Tops · Discord webhooks
#
# Mirrors the in-game notification events (notifications.yml) to a Discord
# channel via a webhook. Disabled by default; set enabled: true and paste
# your webhook URL to start sending messages.
#
# Placeholders: same as notifications.yml
#  {player} {position} {old_position} {top_id} {top_name} {score} {old_score}
############################################

enabled: false

# Discord webhook URL (Discord -> Edit Channel -> Integrations -> Webhooks).
webhook_url: "https://discord.com/api/webhooks/ID/TOKEN"

# Default identity for messages (can be overridden per event).
username: "BK-Tops"
avatar_url: ""

events:
  # Fired when a timed top/leaderboard is reset.
  timed-top-reset:
    enabled: true
    # Optional override for username/avatar.
    # username: "BK-Tops"
    # avatar_url: "https://i.imgur.com/your.png"
    # Plain content (supports placeholders). Multiple lines are joined with a newline.
    content:
      - ":arrows_counterclockwise: Top {top_name} (ID: {top_id}) has been reset!"
    embed:
      enabled: true
      title: "Leaderboard Reset"
      description: "Top {top_name} (ID: {top_id}) has been reset. Push now to climb the ranks!"
      color: 16755200 # orange

  # Fired when a player's position updates. Cases are evaluated in order, first match wins.
  top-position-update:
    enabled: true
    cases:
      # Hit Top 1 from any other position.
      hit-first:
        enabled: true
        when:
          position: 1
          old-position:
            not-equals: 1
        content:
          - ":trophy: {player} just took FIRST place in {top_name}! ({score})"
        embed:
          enabled: true
          title: ":trophy: New #1!"
          description: "{player} is now #1 in {top_name} with {score}."
          color: 16766720 # gold

      # Entered the podium from outside the podium positions.
      podium-enter:
        enabled: true
        when:
          position-range: [1, 3]
          old-position-range: [4, 999999]
        content:
          - ":medal: {player} entered the podium at #{position} in {top_name}!"
        embed:
          enabled: true
          title: ":medal: Podium!"
          description: "{player} climbed to #{position} in {top_name}."
          color: 5025616 # teal

      # Improved position without being a first-place or podium entry case.
      position-improved:
        enabled: true
        when:
          improved: true
        content:
          - ":chart_with_upwards_trend: {player} improved from #{old_position} to #{position} in {top_name}!"
        embed:
          enabled: false

      # Lost position.
      position-lost:
        enabled: true
        when:
          worsened: true
        content:
          - ":warning: {player} fell from #{old_position} to #{position} in {top_name}. Keep trying!"
        embed:
          enabled: false

      # New entry to the leaderboard.
      new-entry:
        enabled: true
        when:
          old-position: "none"
        content:
          - ":sparkles: {player} entered {top_name} at position #{position}!"
        embed:
          enabled: false

      # Generic fallback for any other matching update.
      generic:
        enabled: false
        content:
          - "{player} is now #{position} in {top_name} (was {old_position})."
        embed:
          enabled: false

# DO NOT TOUCH THIS!
config-version: 1
