
spaced:
  char: "-"

  length: 40

number-format:
  mode: EXACT

  thousand-separator: ","

  decimal-separator: "."

  decimal-places: 2

  compact-suffixes:
    thousand: "K"
    million: "M"
    billion: "B"
    trillion: "T"

time-format:
  separator: " "
  significant-figures: 3
  suffixes:
    years: "y"
    months: "mo"
    weeks: "w"
    days: "d"
    hours: "h"
    minutes: "m"
    seconds: "s"

debug: false

config-version: 4