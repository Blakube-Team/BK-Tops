
money:
  type: normal
  size: 15
  provider: "%vault_eco_balance%"
  queues:
    online: false
    online-interval: 288000
    rotative: false
    rotative-size: 50
    rotative-interval: 20
  processing:
    batch-size: 5
    tick-delay: 20
    allow-zero: false

play_time:
  type: normal
  size: 15
  value-format: TIME
  provider: "%statistic_play_time%"
  queues:
    online: false
    online-interval: 288000
    rotative: false
  processing:
    batch-size: 5

kills_perma:
  type: normal
  size: 15
  provider: "%statistic_player_kills%"
  queues:
    online: false
    online-interval: 288000
    rotative: false
  processing:
    batch-size: 5

kills_monthly:
  type: timed
  size: 15
  reset: "monthly"
  provider: "%statistic_player_kills%"
  queues:
    online: false
    online-interval: 288000
    rotative: false
  processing:
    batch-size: 5